    includeRegex: "[?&]udm=26"
    userAgent: desktop
    results:
      - name: Organic result
        root: .MjjYud:has(a[href^="http"][ping]):not(.ULSxyf .MjjYud)
        url: a[href^="http"][ping], a[href^="/url?q="][ping]
        props:
          title: a[href^="http"][ping] > h3, h2, h1
      - name: Image result
        root: .kb0PBd.cvP2Ce
        url: a[href^="http"][ping], a[href^="/url?q="][ping]
        props:
          title: span
        button: [inset, { top: "7px", right: "7px" }]
    commonProps:
      $site: google
      $category: images

  - name: Exact Matches Tab
    description: Google Image Search results for "Exact matches" tab
    matches: *matches
    includeRegex: "[?&]udm=48"
    userAgent: desktop
    results:
      - root: .MjjYud:has(a[href^="http"])
        url: a[href^="http"], a[href^="/url?q="]
        props:
          title: .JGD2rd
    commonProps:
      $site: google
      $category: images

  - name: Visual Matches Tab
    description: Google Image Search results for "Visual Matches" tab
    matches: *matches
    includeRegex: "[?&]udm=44"
    userAgent: desktop
    results:
      - name: Image result
        root: .kb0PBd.cvP2Ce
        url: a[href^="http"], a[href^="/url?q="]
        props:
          title: .JGD2rd
        button: [inset, { top: "7px", right: "7px" }]
    commonProps:
      $site: google
      $category: images